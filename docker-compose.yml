services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moments-frontend
    restart: unless-stopped
    ports:
      - '3080:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - moments-network

  nginx:
    image: nginx:alpine
    container_name: moments-nginx
    restart: unless-stopped
    ports:
      - '8000:80'
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - moments-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moments-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    networks:
      - moments-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: moments-db
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_DATABASE: moments_db
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - moments-network

networks:
  moments-network:
    driver: bridge

volumes:
  db-data:
